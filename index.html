<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呂氏家庭生活資訊網 3.0 - 考績中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap');
        body { font-family: "Noto Sans TC", sans-serif; background: #020617; color: #f8fafc; }
        .tech-num { font-family: 'Orbitron', sans-serif; }
        .hex-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 254, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex items-center justify-center">

    <section id="performance" class="max-w-md w-full">
        <div class="hex-card p-8 rounded-3xl border border-cyan-500/30 shadow-2xl">
            <h2 class="text-xl font-black text-cyan-400 mb-6 flex items-center gap-2">
                <i class="fa-solid fa-user-shield"></i> 年度考績系統
            </h2>
            
            <!-- 查詢輸入區 -->
            <input type="password" id="memberKey" 
                    onkeydown="if(event.keyCode==13) verifyPerformance()"
                    lang="en" spellcheck="false" inputmode="latin"
                    class="w-full bg-slate-950 border border-slate-700 rounded-xl px-6 py-4 text-white text-lg tech-num focus:border-cyan-500 outline-none mb-4" 
                    placeholder="輸入授權碼...">
            
            <button onclick="verifyPerformance()" 
                    class="w-full bg-cyan-600 font-black py-4 rounded-xl hover:bg-cyan-500 transition-all uppercase tracking-widest text-sm mb-6">
                Execute Verification
            </button>

            <!-- 新增：密碼查詢專區 -->
            <div class="border-t border-slate-800 pt-6">
                <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-3 text-center">忘記授權碼？查詢專區</p>
                <div class="flex gap-2">
                    <input type="text" id="nameQuery" class="flex-1 bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white outline-none focus:border-cyan-500" placeholder="輸入真實姓名...">
                    <button onclick="findKey()" class="bg-slate-800 px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-700">查詢</button>
                </div>
            </div>

            <div id="resultOutput" class="mt-8 p-6 bg-slate-950 rounded-2xl hidden border border-slate-800"></div>
        </div>
    </section>

    <script>
        const unitMap = { "A": "總部", "B": "第一分支", "C": "第二分支" };
        const membersDatabase = {
            "A101": { name: "呂陳英妹", unit: "A", pass: true, p1: 98, p2: 97, p3: 98, openDate: "2026-05-31" },
            "A102": { name: "呂佳寯", unit: "A", pass: true, p1: 95, p2: 90, p3: 92, openDate: "2026-05-31" },
            "A103": { name: "呂佳芯", unit: "A", pass: true, p1: 90, p2: 85, p3: 88, openDate: "2026-05-31" },
            "A104": { name: "呂幸福", unit: "A", pass: true, p1: 85, p2: 88, p3: 86, openDate: "2026-05-31" },
            "A105": { name: "吳孟綺", unit: "A", pass: true, p1: 84, p2: 87, p3: 85, openDate: "2026-05-31" },
            "A106": { name: "呂理享", unit: "A", pass: true, p1: 86, p2: 85, p3: 85, openDate: "2026-05-31" },
            "A107": { name: "阮氏紅幸", unit: "A", pass: true, p1: 83, p2: 82, p3: 82, openDate: "2026-05-31" },
            "C301": { name: "呂寶梅", unit: "C", pass: true, p1: 82, p2: 85, p3: 83, openDate: "2026-05-31" },
            "C302": { name: "劉沛緹", unit: "C", pass: true, p1: 80, p2: 84, p3: 82, openDate: "2026-05-31" },
            "C303": { name: "劉宗豪", unit: "C", pass: true, p1: 81, p2: 82, p3: 81, openDate: "2026-05-31" },
            "B201": { name: "于國輝", unit: "B", pass: true, p1: 84, p2: 86, p3: 85, openDate: "2026-05-31" },
            "B202": { name: "于子祥", unit: "B", pass: true, p1: 82, p2: 85, p3: 83, openDate: "2026-05-18" },
            "B203": { name: "呂寶珠", unit: "B", pass: true, p1: 83, p2: 87, p3: 85, openDate: "2026-05-31" },
            "B204": { name: "陳凱華", unit: "B", pass: true, p1: 81, p2: 83, p3: 82, openDate: "2026-05-31" },
            "B205": { name: "劉羿汝", unit: "B", pass: false, p1: 55, p2: 50, p3: 52, openDate: "2026-05-20" },
            "B206": { name: "陳俊廷", unit: "B", pass: true, p1: 82, p2: 80, p3: 81, openDate: "2026-05-31" }
        };

        function verifyPerformance() { /* (原本的邏輯) */ }

        // 新增：授權碼查詢功能
        function findKey() {
            const name = document.getElementById('nameQuery').value.trim();
            const output = document.getElementById('resultOutput');
            output.classList.remove('hidden');

            const found = Object.entries(membersDatabase).find(([key, p]) => p.name === name);
            if (found) {
                output.innerHTML = `<p class="text-emerald-400 font-bold text-center text-xs">🔍 您的授權碼為：<span class="text-white text-lg">${found[0]}</span></p>`;
            } else {
                output.innerHTML = `<p class="text-pink-500 font-bold text-center text-xs">❌ 查無此人姓名。</p>`;
            }
        }
    </script>
</body>
</html>
