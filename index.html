<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呂氏家庭考績中心 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .hex-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 254, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-center">

    <section id="memberSection" class="max-w-md w-full hex-card p-8 rounded-3xl border border-cyan-500/30 shadow-2xl">
        <div class="text-center mb-6">
            <h1 class="text-lg font-black text-white tracking-widest">呂氏家庭考績中心</h1>
            <p class="text-[10px] text-cyan-400 mt-1 uppercase tracking-[0.2em]">政戰幹部：呂佳寯 負責</p>
        </div>
        
        <div class="bg-indigo-900/30 p-4 rounded-xl border border-indigo-500/30 mb-6 text-center">
            <p class="text-white text-xs mb-1">年度考核統一開放時間：<span class="text-emerald-400 font-bold">115/05/31</span></p>
            <p class="text-[9px] text-slate-400 italic">(部分人員系統已提前開放)</p>
        </div>

        <input type="password" id="memberKey" maxlength="4" placeholder="輸入四位數授權碼..." onkeydown="if(event.keyCode==13) verifyMember()"
               class="w-full bg-slate-950 border border-slate-700 rounded-xl px-6 py-4 text-white text-lg focus:border-cyan-500 outline-none mb-4 text-center">
        <button onclick="verifyMember()" class="w-full bg-cyan-600 font-bold py-4 rounded-xl hover:bg-cyan-500 transition-all uppercase tracking-widest text-sm">查詢考績</button>
        
        <div class="mt-6 pt-6 border-t border-slate-800">
            <p class="text-[10px] text-slate-500 text-center mb-2 uppercase">忘記授權碼？查詢專區</p>
            <div class="flex gap-2">
                <input type="text" id="nameInput" placeholder="輸入真實姓名" onkeydown="if(event.keyCode==13) showSecurityWarning()" class="flex-1 bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white outline-none focus:border-cyan-500">
                <button onclick="showSecurityWarning()" class="bg-slate-800 px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-700">查詢</button>
            </div>
        </div>
        <div id="memberResult" class="mt-6 p-4 bg-slate-900 rounded-xl hidden text-sm"></div>
    </section>

    <button onclick="document.getElementById('adminModal').classList.remove('hidden')" class="mt-8 text-[10px] text-slate-600 hover:text-slate-400 uppercase tracking-widest">
        <i class="fa-solid fa-lock mr-1"></i> 管理員登入
    </button>

    <div id="adminModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-sm border border-indigo-500/50">
            <h3 class="text-indigo-400 font-bold mb-4 text-center">後台管理驗證</h3>
            <input type="password" id="adminPass" placeholder="輸入管理密碼..." onkeydown="if(event.keyCode==13) verifyAdmin()" class="w-full bg-slate-800 p-3 rounded-lg text-white mb-4">
            <div class="flex gap-2">
                <button onclick="document.getElementById('adminModal').classList.add('hidden')" class="flex-1 bg-slate-700 py-2 rounded-lg text-xs">取消</button>
                <button onclick="verifyAdmin()" class="flex-1 bg-indigo-600 py-2 rounded-lg text-xs font-bold">驗證進入</button>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="fixed inset-0 bg-slate-950 hidden p-4 overflow-y-auto z-40">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-indigo-400 font-bold uppercase">全體資料維護</h2>
                <button onclick="document.getElementById('adminPanel').classList.add('hidden')" class="text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="adminDataList" class="space-y-4"></div>
        </div>
    </div>

    <div id="securityModal" class="fixed inset-0 bg-red-950/90 hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-slate-950 p-6 rounded-2xl border border-red-500 max-w-sm w-full text-center">
            <i class="fa-solid fa-triangle-exclamation text-red-500 text-4xl mb-4"></i>
            <h3 class="text-red-500 font-bold mb-2">系統安全警告</h3>
            <p class="text-white text-xs mb-6">未經授權嚴禁隨意查詢、使用或洩漏他人授權碼。系統已記錄本次查詢行為，若發現任何非法濫用，將立即啟動徹查程序。請立即關閉此視窗。</p>
            <div class="flex gap-2">
                <button onclick="document.getElementById('securityModal').classList.add('hidden')" class="flex-1 bg-slate-800 py-2 rounded-lg text-xs">關閉</button>
                <button onclick="findKey()" class="flex-1 bg-red-600 py-2 rounded-lg text-xs font-bold">確認查詢</button>
            </div>
        </div>
    </div>

    <script>
        const rewardTypes = ['無', '警告', '小過', '嘉獎', '小功', '大功'];
        const membersDatabase = {
            "A101": { name: "呂陳英妹", status: "在職", role: "幹部", p1: 98, p2: 97, p3: 98, reward: "無", openDate: "2026-05-31" },
            "A102": { name: "呂佳寯", status: "在職", role: "幹部", p1: 95, p2: 90, p3: 92, reward: "無", openDate: "2026-05-31" },
            "A103": { name: "呂佳芯", status: "在職", role: "同仁", p1: 90, p2: 85, p3: 88, reward: "無", openDate: "2026-05-31" },
            "A104": { name: "呂幸福", status: "在職", role: "同仁", p1: 85, p2: 88, p3: 86, reward: "無", openDate: "2026-05-31" },
            "A105": { name: "吳孟綺", status: "在職", role: "同仁", p1: 84, p2: 87, p3: 85, reward: "無", openDate: "2026-05-31" },
            "A106": { name: "呂理享", status: "在職", role: "同仁", p1: 86, p2: 85, p3: 85, reward: "無", openDate: "2026-05-31" },
            "A107": { name: "阮氏紅幸", status: "在職", role: "同仁", p1: 83, p2: 82, p3: 82, reward: "無", openDate: "2026-05-31" },
            "C301": { name: "呂寶梅", status: "在職", role: "幹部", p1: 82, p2: 85, p3: 83, reward: "無", openDate: "2026-05-31" },
            "C302": { name: "劉沛緹", status: "在職", role: "同仁", p1: 80, p2: 84, p3: 82, reward: "無", openDate: "2026-05-31" },
            "C303": { name: "劉宗豪", status: "在職", role: "同仁", p1: 81, p2: 82, p3: 81, reward: "無", openDate: "2026-05-31" },
            "B201": { name: "于國輝", status: "在職", role: "幹部", p1: 84, p2: 86, p3: 85, reward: "無", openDate: "2026-05-31" },
            "B202": { name: "于子祥", status: "在職", role: "同仁", p1: 82, p2: 85, p3: 83, reward: "無", openDate: "2026-05-18" },
            "B203": { name: "呂寶珠", status: "在職", role: "同仁", p1: 83, p2: 87, p3: 85, reward: "無", openDate: "2026-05-31" },
            "B204": { name: "陳凱華", status: "在職", role: "同仁", p1: 81, p2: 83, p3: 82, reward: "無", openDate: "2026-05-31" },
            "B205": { name: "劉羿汝", status: "撤職", role: "同仁", p1: 55, p2: 50, p3: 52, reward: "無", openDate: "2026-05-20" },
            "B206": { name: "陳俊廷", status: "在職", role: "同仁", p1: 82, p2: 80, p3: 81, reward: "無", openDate: "2026-05-31" }
        };

        function verifyAdmin() {
            if (document.getElementById('adminPass').value === "admin9999") {
                document.getElementById('adminModal').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                renderAdminPanel();
            } else { alert("密碼錯誤"); }
        }

        function renderAdminPanel() {
            const list = document.getElementById('adminDataList');
            list.innerHTML = Object.entries(membersDatabase).map(([key, p], i) => `
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-700 text-xs">
                    <div class="text-white font-bold mb-2">${p.name} (${key})</div>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <select id="s_${i}" class="bg-slate-800 p-1 text-white">${['在職', '撤職'].map(s => `<option ${p.status==s?'selected':''}>${s}</option>`).join('')}</select>
                        <select id="r_${i}" class="bg-slate-800 p-1 text-white">${['幹部', '同仁'].map(s => `<option ${p.role==s?'selected':''}>${s}</option>`).join('')}</select>
                    </div>
                    <div class="grid grid-cols-3 gap-1 mb-2">
                        <input type="number" id="p1_${i}" value="${p.p1}" class="bg-slate-800 p-1 text-white text-center" placeholder="表現">
                        <input type="number" id="p2_${i}" value="${p.p2}" class="bg-slate-800 p-1 text-white text-center" placeholder="績效">
                        <input type="number" id="p3_${i}" value="${p.p3}" class="bg-slate-800 p-1 text-white text-center" placeholder="總評">
                    </div>
                    <select id="rw_${i}" class="w-full bg-slate-800 p-1 text-amber-400 mb-2">${rewardTypes.map(r => `<option ${p.reward==r?'selected':''}>${r}</option>`).join('')}</select>
                    <input type="date" id="d_${i}" value="${p.openDate}" class="w-full bg-slate-800 p-1 text-white mb-2 text-center">
                    <button onclick="updateMember('${key}', ${i})" class="w-full bg-indigo-600 py-1.5 rounded text-white font-bold">儲存</button>
                </div>`).join('');
        }

        function updateMember(k, i) {
            membersDatabase[k].status = document.getElementById('s_'+i).value;
            membersDatabase[k].role = document.getElementById('r_'+i).value;
            membersDatabase[k].p1 = document.getElementById('p1_'+i).value;
            membersDatabase[k].p2 = document.getElementById('p2_'+i).value;
            membersDatabase[k].p3 = document.getElementById('p3_'+i).value;
            membersDatabase[k].reward = document.getElementById('rw_'+i).value;
            membersDatabase[k].openDate = document.getElementById('d_'+i).value;
            alert("已更新");
        }

        function showSecurityWarning() { if(document.getElementById('nameInput').value.trim() !== "") document.getElementById('securityModal').classList.remove('hidden'); }
        function findKey() {
            document.getElementById('securityModal').classList.add('hidden');
            const name = document.getElementById('nameInput').value.trim();
            const out = document.getElementById('memberResult');
            const foundKey = Object.keys(membersDatabase).find(k => membersDatabase[k].name === name);
            out.classList.remove('hidden');
            out.innerHTML = foundKey ? `🔍 查詢結果：<span class="text-xl text-cyan-400 font-bold">${foundKey}</span>` : "❌ 查無此人";
        }

        function verifyMember() {
            const key = document.getElementById('memberKey').value;
            const p = membersDatabase[key];
            const out = document.getElementById('memberResult');
            out.classList.remove('hidden');
            if(!p) out.innerText = "❌ 授權碼錯誤";
            else if(new Date() < new Date(p.openDate)) out.innerText = "🚫 未達開放時間";
            else out.innerHTML = `<div class="text-center font-bold text-lg">${p.name}<br><span class="text-xs text-slate-400">${p.role}</span><br>總評：${p.p3}<br><span class="text-amber-400 text-xs">獎懲：${p.reward}</span></div>`;
        }
    </script>
</body>
</html>
