<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呂氏家庭生活資訊網 3.0 - 考績中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap');
        body { font-family: "Noto Sans TC", sans-serif; background: #020617; color: #f8fafc; }
        .tech-num { font-family: 'Orbitron', sans-serif; }
        .hex-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 254, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex items-center justify-center">

    <section id="performance" class="max-w-md w-full">
        <div class="hex-card p-8 rounded-3xl border border-cyan-500/30 shadow-2xl">
            <h2 class="text-xl font-black text-cyan-400 mb-6 flex items-center gap-2">
                <i class="fa-solid fa-user-shield"></i> 年度考績系統 (數據矩陣)
            </h2>
            
            <input type="password" id="memberKey" 
                    class="w-full bg-slate-950 border border-slate-700 rounded-xl px-6 py-4 text-white text-lg tech-num focus:border-cyan-500 outline-none mb-4" 
                    placeholder="輸入授權碼...">
            
            <button onclick="verifyPerformance()" 
                    class="w-full bg-cyan-600 font-black py-4 rounded-xl hover:bg-cyan-500 transition-all uppercase tracking-widest text-sm">
                Execute Verification
            </button>

            <div id="resultOutput" class="mt-8 p-6 bg-slate-950 rounded-2xl hidden border border-slate-800"></div>
        </div>
    </section>

    <script>
        const membersDatabase = {
            "妹555": { name: "呂陳英妹", unit: "總部", pass: true, p1: 98, p2: 97, p3: 98, openDate: "2026-05-31" },
            "雋202": { name: "呂佳寯", unit: "總部", pass: true, p1: 95, p2: 90, p3: 92, openDate: "2026-05-31" },
            "芯821": { name: "呂佳芯", unit: "總部", pass: true, p1: 90, p2: 85, p3: 88, openDate: "2026-05-31" },
            "福777": { name: "呂幸福", unit: "總部", pass: true, p1: 85, p2: 88, p3: 86, openDate: "2026-05-31" },
            "綺111": { name: "吳孟綺", unit: "總部", pass: true, p1: 84, p2: 87, p3: 85, openDate: "2026-05-31" },
            "享123": { name: "呂理享", unit: "總部", pass: true, p1: 86, p2: 85, p3: 85, openDate: "2026-05-31" },
            "幸001": { name: "阮氏紅幸", unit: "總部", pass: true, p1: 83, p2: 82, p3: 82, openDate: "2026-05-31" },
            "梅666": { name: "呂寶梅", unit: "第二分支", pass: true, p1: 82, p2: 85, p3: 83, openDate: "2026-05-31" },
            "緹999": { name: "劉沛緹", unit: "第二分支", pass: true, p1: 80, p2: 84, p3: 82, openDate: "2026-05-31" },
            "豪888": { name: "劉宗豪", unit: "第二分支", pass: true, p1: 81, p2: 82, p3: 81, openDate: "2026-05-31" },
            "輝321": { name: "於國輝", unit: "第一分支", pass: true, p1: 84, p2: 86, p3: 85, openDate: "2026-05-31" },
            "祥520": { name: "於子祥", unit: "第一分支", pass: true, p1: 82, p2: 85, p3: 83, openDate: "2026-05-18" },
            "珠889": { name: "呂寶珠", unit: "第一分支", pass: true, p1: 83, p2: 87, p3: 85, openDate: "2026-05-31" },
            "華711": { name: "陳凱華", unit: "第一分支", pass: true, p1: 81, p2: 83, p3: 82, openDate: "2026-05-31" },
            "汝101": { name: "劉羿汝", unit: "第一分支", pass: false, p1: 55, p2: 50, p3: 52, openDate: "2026-05-20" },
            "廷991": { name: "陳俊廷", unit: "第一分支", pass: true, p1: 82, p2: 80, p3: 81, openDate: "2026-05-31" }
        };

        function verifyPerformance() {
            const code = document.getElementById('memberKey').value.trim();
            const output = document.getElementById('resultOutput');
            output.classList.remove('hidden');
            const now = new Date();
            const today = now.toISOString().split('T')[0];

            if (code === "admin9999") {
                output.innerHTML = `
                    <h3 class="text-indigo-400 font-bold mb-4 text-xs uppercase tracking-widest text-center">管理員：權限與排程維護</h3>
                    <div class="mb-6 bg-slate-900 p-3 rounded-lg border border-indigo-500/30">
                        <h4 class="text-[10px] text-slate-400 uppercase mb-2">成員查詢狀態總覽</h4>
                        <div class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto custom-scrollbar">
                            ${Object.entries(membersDatabase).map(([key, p]) => `
                                <div class="flex justify-between text-[10px] bg-slate-950 p-1.5 rounded border ${p.openDate <= today ? 'border-emerald-900 text-emerald-400' : 'border-slate-800 text-slate-500'}">
                                    <span>${p.name}</span>
                                    <span>${p.openDate <= today ? '已開放' : p.openDate}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="space-y-4 max-h-60 overflow-y-auto custom-scrollbar pr-2">
                        ${Object.entries(membersDatabase).map(([key, p], index) => `
                            <div class="bg-slate-900 p-3 rounded-lg border border-slate-800 text-xs">
                                <div class="text-white font-bold mb-2">${p.name} (${key})</div>
                                <div class="grid grid-cols-4 gap-1 mb-2">
                                    <input type="number" id="p1_${index}" value="${p.p1}" class="bg-slate-800 p-1 rounded text-center text-white" placeholder="P1">
                                    <input type="number" id="p2_${index}" value="${p.p2}" class="bg-slate-800 p-1 rounded text-center text-white" placeholder="P2">
                                    <input type="number" id="p3_${index}" value="${p.p3}" class="bg-slate-800 p-1 rounded text-center text-white" placeholder="P3">
                                    <select id="pass_${index}" class="bg-slate-800 p-1 rounded text-center ${p.pass ? 'text-emerald-400' : 'text-red-400'}">
                                        <option value="true" ${p.pass ? 'selected' : ''}>P</option>
                                        <option value="false" ${!p.pass ? 'selected' : ''}>F</option>
                                    </select>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-slate-500 w-16">開放日:</span>
                                    <input type="date" id="date_${index}" value="${p.openDate}" class="bg-slate-800 p-1 rounded text-white flex-grow">
                                </div>
                                <button onclick="updateMember('${key}', ${index})" class="w-full mt-3 bg-indigo-600 py-1.5 rounded hover:bg-indigo-500 transition-all font-bold">儲存設定</button>
                            </div>`).join('')}
                    </div>`;
            } else if (membersDatabase[code]) {
                const p = membersDatabase[code];
                const openDate = new Date(p.openDate + "T00:00:00");
                if (now < openDate) {
                    output.innerHTML = `<div class="text-center p-4"><i class="fa-solid fa-lock text-pink-500 text-3xl mb-4"></i><h3 class="text-white font-bold text-lg">系統鎖定</h3><p class="text-slate-400 text-xs mt-2">您的查詢開放日期為：${p.openDate}</p></div>`;
                } else {
                    output.innerHTML = `
                        <div class="text-center">
                            <h3 class="text-2xl font-black text-white mb-1">${p.name}</h3>
                            <p class="text-cyan-400 font-bold mb-6 text-sm">${p.unit}</p>
                            <div class="grid grid-cols-3 gap-2 mb-6">
                                <div class="bg-slate-900 p-2 rounded-lg border border-slate-700"><p class="text-[8px] text-slate-500">表現</p><p class="font-bold text-white text-xs">${p.p1}</p></div>
                                <div class="bg-slate-900 p-2 rounded-lg border border-slate-700"><p class="text-[8px] text-slate-500">績效</p><p class="font-bold text-white text-xs">${p.p2}</p></div>
                                <div class="bg-slate-900 p-2 rounded-lg border border-slate-700"><p class="text-[8px] text-slate-500">總評</p><p class="font-bold text-cyan-400 text-xs">${p.p3}</p></div>
                            </div>
                        </div>`;
                }
            } else {
                output.innerHTML = `<p class="text-pink-500 font-bold text-center text-xs">❌ 授權碼無效</p>`;
            }
        }

        function updateMember(key, index) {
            membersDatabase[key].p1 = parseInt(document.getElementById(`p1_${index}`).value);
            membersDatabase[key].p2 = parseInt(document.getElementById(`p2_${index}`).value);
            membersDatabase[key].p3 = parseInt(document.getElementById(`p3_${index}`).value);
            membersDatabase[key].pass = document.getElementById(`pass_${index}`).value === "true";
            membersDatabase[key].openDate = document.getElementById(`date_${index}`).value;
            alert(`[系統更新] ${membersDatabase[key].name} 資料已儲存！`);
            verifyPerformance(); // 重新整理視圖
        }
    </script>
</body>
</html>
