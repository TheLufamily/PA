<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>呂氏家庭考績中心 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <!-- 查詢區 -->
    <section class="max-w-md w-full bg-slate-900 p-8 rounded-3xl border border-cyan-500/30 shadow-2xl text-center">
        <h1 class="text-xl font-black mb-6">呂氏家庭考績中心</h1>
        <input type="password" id="memberKey" maxlength="4" placeholder="輸入授權碼..." class="w-full bg-slate-800 p-4 rounded-xl mb-4 text-center">
        <button onclick="verifyMember()" class="w-full bg-cyan-600 py-4 rounded-xl font-bold">查詢考績</button>
    </section>

    <!-- 管理員入口 -->
    <button onclick="document.getElementById('adminModal').classList.remove('hidden')" class="mt-8 text-xs text-slate-500 uppercase tracking-widest hover:text-white">
        <i class="fa-solid fa-lock mr-1"></i> 管理員登入
    </button>

    <!-- 管理員驗證彈窗 -->
    <div id="adminModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-sm border border-indigo-500">
            <h3 class="font-bold mb-4">管理員驗證</h3>
            <input type="password" id="adminPass" placeholder="輸入管理密碼..." class="w-full bg-slate-800 p-3 rounded-lg mb-4 text-center">
            <div class="flex gap-2">
                <button onclick="document.getElementById('adminModal').classList.add('hidden')" class="flex-1 bg-slate-700 py-2 rounded-lg text-xs">取消</button>
                <button onclick="verifyAdmin()" class="flex-1 bg-indigo-600 py-2 rounded-lg text-xs font-bold">驗證進入</button>
            </div>
        </div>
    </div>

    <!-- 管理員後台面板 -->
    <div id="adminPanel" class="fixed inset-0 bg-slate-950 hidden p-4 overflow-y-auto z-40">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-indigo-400 font-bold uppercase">全體資料維護</h2>
                <button onclick="document.getElementById('adminPanel').classList.add('hidden')" class="text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="adminDataList" class="space-y-4 pb-20"></div>
        </div>
    </div>

    <script>
        const membersDatabase = {
            "A101": { name: "呂陳英妹", unit: "總部", p3: 98, pass: true, reward: "無" },
            "A102": { name: "呂佳寯", unit: "總部", p3: 92, pass: true, reward: "無" },
            "A103": { name: "呂佳芯", unit: "總部", p3: 88, pass: true, reward: "無" },
            "A104": { name: "呂幸福", unit: "總部", p3: 86, pass: true, reward: "無" },
            "A105": { name: "吳孟綺", unit: "總部", p3: 85, pass: true, reward: "無" },
            "A106": { name: "呂理享", unit: "總部", p3: 85, pass: true, reward: "無" },
            "A107": { name: "阮氏紅幸", unit: "總部", p3: 82, pass: true, reward: "無" },
            "C301": { name: "呂寶梅", unit: "第二分支", p3: 83, pass: true, reward: "無" },
            "C302": { name: "劉沛緹", unit: "第二分支", p3: 82, pass: true, reward: "無" },
            "C303": { name: "劉宗豪", unit: "第二分支", p3: 81, pass: true, reward: "無" },
            "B201": { name: "于國輝", unit: "第一分支", p3: 85, pass: true, reward: "無" },
            "B202": { name: "于子祥", unit: "第一分支", p3: 83, pass: true, reward: "無" },
            "B203": { name: "呂寶珠", unit: "第一分支", p3: 85, pass: true, reward: "無" },
            "B204": { name: "陳凱華", unit: "第一分支", p3: 82, pass: true, reward: "無" },
            "B205": { name: "劉羿汝", unit: "第一分支", p3: 52, pass: false, reward: "無" },
            "B206": { name: "陳俊廷", unit: "第一分支", p3: 81, pass: true, reward: "無" }
        };

        function verifyAdmin() {
            if (document.getElementById('adminPass').value === "admin9999") {
                document.getElementById('adminModal').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                renderAdminPanel();
            } else { alert("密碼錯誤"); }
        }

        function renderAdminPanel() {
            const list = document.getElementById('adminDataList');
            list.innerHTML = Object.entries(membersDatabase).map(([key, p]) => `
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-700 flex justify-between items-center text-xs">
                    <div>${p.name} (${key}) - 總評: ${p.p3}</div>
                    <button onclick="alert('請在程式碼內直接修改資料庫，目前為唯讀展示')" class="bg-indigo-600 px-3 py-1 rounded">檢視</button>
                </div>`).join('');
        }

        function verifyMember() {
            const key = document.getElementById('memberKey').value;
            const p = membersDatabase[key];
            if(!p) { alert("授權碼錯誤"); return; }
            alert(p.name + " 考核總評: " + p.p3 + (p.pass ? " (通過)" : " (未通過)"));
        }
    </script>
</body>
</html>
