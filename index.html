<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>呂氏家庭考績中心 - 16人完整版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #020617; color: #f8fafc; font-family: sans-serif; }</style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-center">

    <!-- 前台查詢區 -->
    <section class="max-w-md w-full bg-slate-900 p-8 rounded-3xl border border-cyan-500/30 shadow-2xl text-center">
        <h1 class="text-xl font-black mb-1 text-white">呂氏家庭考績中心</h1>
        <p class="text-[10px] text-cyan-400 mb-6 uppercase tracking-widest">政戰幹部：呂佳寯 負責</p>
        
        <input type="text" id="memberKey" placeholder="輸入授權碼 (如 A101)..." onkeydown="if(event.key === 'Enter') verifyMember()" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-6 py-4 mb-4 text-center">
        <button onclick="verifyMember()" class="w-full bg-cyan-600 py-4 rounded-xl font-bold mb-6">查詢考績</button>
        
        <div class="pt-6 border-t border-slate-800">
            <input type="text" id="nameInput" placeholder="輸入姓名找回授權碼" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2 mb-2 text-center text-sm">
            <button onclick="findKeyByName()" class="w-full bg-slate-800 py-2 rounded-lg text-xs font-bold hover:bg-slate-700">查詢授權碼</button>
            <div id="foundKeyResult" class="mt-2 text-cyan-400 font-bold text-sm"></div>
        </div>
    </section>

    <!-- 結果顯示視窗 -->
    <div id="resultModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border border-cyan-500 p-8 rounded-3xl w-full max-w-sm text-center">
            <h2 id="resTitle" class="text-lg font-bold mb-4">查詢結果</h2>
            <div id="resBody" class="text-sm text-slate-300 space-y-2 mb-6"></div>
            <button onclick="document.getElementById('resultModal').classList.add('hidden')" class="w-full bg-cyan-600 py-2 rounded-lg font-bold">確認</button>
        </div>
    </div>

    <!-- 管理員後台 (密碼 admin9999) -->
    <button onclick="document.getElementById('adminModal').classList.remove('hidden')" class="mt-8 text-[10px] text-slate-500 uppercase">管理員後台</button>

    <div id="adminModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-[300]">
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-sm border border-indigo-500 text-center">
            <h3 class="font-bold mb-4 text-indigo-400">管理員驗證</h3>
            <input type="password" id="adminPass" placeholder="輸入密碼..." class="w-full bg-slate-800 p-3 rounded-lg mb-4 text-center text-white">
            <button onclick="verifyAdmin()" class="w-full bg-indigo-600 py-2 rounded-lg font-bold">驗證進入</button>
        </div>
    </div>

    <div id="adminPanel" class="fixed inset-0 bg-slate-950 hidden p-4 overflow-y-auto z-[200]">
        <div class="max-w-6xl mx-auto"><div class="flex justify-between mb-6"><h2 class="text-indigo-400 font-bold">維護系統</h2><button onclick="document.getElementById('adminPanel').classList.add('hidden')" class="text-white text-xl">✕</button></div><div id="dataRows" class="space-y-2"></div></div>
    </div>

    <script>
        const rewardOptions = ['無', '警告', '小過', '嘉獎', '小功', '大功'];
        let db = {
            "A101": { name: "呂陳英妹", role: "幹部", status: "在職", p1: 98, p2: 97, p3: 98, pass: true, reward: "無", openDate: "2026-05-31" },
            "A102": { name: "呂佳寯", role: "幹部", status: "在職", p1: 95, p2: 90, p3: 92, pass: true, reward: "無", openDate: "2026-05-31" },
            "A103": { name: "呂佳芯", role: "同仁", status: "在職", p1: 90, p2: 85, p3: 88, pass: true, reward: "無", openDate: "2026-05-31" },
            "A104": { name: "呂幸福", role: "同仁", status: "在職", p1: 85, p2: 88, p3: 86, pass: true, reward: "無", openDate: "2026-05-31" },
            "A105": { name: "吳孟綺", role: "同仁", status: "在職", p1: 84, p2: 87, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "A106": { name: "呂理享", role: "同仁", status: "在職", p1: 86, p2: 85, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "A107": { name: "阮氏紅幸", role: "同仁", status: "在職", p1: 83, p2: 82, p3: 82, pass: true, reward: "無", openDate: "2026-05-31" },
            "C301": { name: "呂寶梅", role: "幹部", status: "在職", p1: 82, p2: 85, p3: 83, pass: true, reward: "無", openDate: "2026-05-31" },
            "C302": { name: "劉沛緹", role: "同仁", status: "在職", p1: 80, p2: 84, p3: 82, pass: true, reward: "無", openDate: "2026-05-31" },
            "C303": { name: "劉宗豪", role: "同仁", status: "在職", p1: 81, p2: 82, p3: 81, pass: true, reward: "無", openDate: "2026-05-31" },
            "B201": { name: "於國輝", role: "幹部", status: "在職", p1: 84, p2: 86, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "B202": { name: "於子祥", role: "同仁", status: "在職", p1: 82, p2: 85, p3: 83, pass: true, reward: "無", openDate: "2026-05-18" },
            "B203": { name: "呂寶珠", role: "同仁", status: "在職", p1: 83, p2: 87, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "B204": { name: "陳凱華", role: "同仁", status: "在職", p1: 81, p2: 83, p3: 82, pass: true, reward: "無", openDate: "2026-05-31" },
            "B205": { name: "劉羿汝", role: "同仁", status: "撤職", p1: 55, p2: 50, p3: 52, pass: false, reward: "無", openDate: "2026-05-20" },
            "B206": { name: "陳俊廷", role: "同仁", status: "在職", p1: 82, p2: 80, p3: 81, pass: true, reward: "無", openDate: "2026-05-31" }
        };

        function verifyMember() {
            const p = db[document.getElementById('memberKey').value.trim()];
            if(!p) { alert("授權碼錯誤"); return; }
            if("2026-05-20" < p.openDate) { alert("尚未開放，開放日期：" + p.openDate); return; }
            document.getElementById('resTitle').innerText = p.name + " 的考績";
            document.getElementById('resBody').innerHTML = `<p>總評：${p.p3}</p><p class="${p.pass?'text-emerald-400':'text-red-400'}">${p.pass?'考核通過':'考核未通過'}</p>`;
            document.getElementById('resultModal').classList.remove('hidden');
        }

        function findKeyByName() {
            const key = Object.keys(db).find(k => db[k].name === document.getElementById('nameInput').value.trim());
            document.getElementById('foundKeyResult').innerText = key ? "代碼: " + key : "查無此人";
        }

        function verifyAdmin() { if(document.getElementById('adminPass').value === "admin9999") { document.getElementById('adminModal').classList.add('hidden'); document.getElementById('adminPanel').classList.remove('hidden'); renderAdminPanel(); } else alert("密碼錯誤"); }

        function renderAdminPanel() {
            document.getElementById('dataRows').innerHTML = Object.entries(db).map(([k, p]) => `
                <div class="grid grid-cols-7 gap-1 items-center bg-slate-900 p-2 rounded text-[10px]">
                    <div class="font-bold text-indigo-400">${p.name} (${k})</div>
                    <select id="st_${k}" class="bg-slate-800"><option ${p.status=='在職'?'selected':''}>在職</option><option ${p.status=='撤職'?'selected':''}>撤職</option></select>
                    <select id="ro_${k}" class="bg-slate-800"><option ${p.role=='幹部'?'selected':''}>幹部</option><option ${p.role=='同仁'?'selected':''}>同仁</option></select>
                    <div class="flex gap-0.5"><input id="p1_${k}" value="${p.p1}" class="w-6 bg-slate-800 text-center"><input id="p2_${k}" value="${p.p2}" class="w-6 bg-slate-800 text-center"><input id="p3_${k}" value="${p.p3}" class="w-6 bg-slate-800 text-center"></div>
                    <select id="rw_${k}" class="bg-slate-800">${rewardOptions.map(r => `<option ${p.reward==r?'selected':''}>${r}</option>`).join('')}</select>
                    <input id="date_${k}" type="date" value="${p.openDate}" class="bg-slate-800">
                    <button onclick="update('${k}')" class="bg-indigo-600 py-1 rounded font-bold">儲存</button>
                </div>`).join('');
        }

        function update(k) {
            db[k].status = document.getElementById('st_'+k).value;
            db[k].role = document.getElementById('ro_'+k).value;
            db[k].p1 = document.getElementById('p1_'+k).value;
            db[k].p2 = document.getElementById('p2_'+k).value;
            db[k].p3 = document.getElementById('p3_'+k).value;
            db[k].reward = document.getElementById('rw_'+k).value;
            db[k].openDate = document.getElementById('date_'+k).value;
            alert(db[k].name + " 已同步");
        }
    </script>
</body>
</html>
