<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>呂氏家庭考績中心 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>body { background: #020617; color: #f8fafc; font-family: sans-serif; }</style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-center">

    <!-- 查詢區 -->
    <section class="max-w-md w-full bg-slate-900 p-8 rounded-3xl border border-cyan-500/30 shadow-2xl text-center">
        <h1 class="text-lg font-black text-white mb-6">呂氏家庭考績中心</h1>
        <input type="password" id="memberKey" maxlength="4" placeholder="輸入授權碼..." class="w-full bg-slate-950 border border-slate-700 rounded-xl px-6 py-4 mb-4 text-center text-white">
        <button onclick="verifyMember()" class="w-full bg-cyan-600 py-4 rounded-xl font-bold uppercase text-sm">查詢考績</button>
        <div id="memberResult" class="mt-4 text-xs font-bold text-cyan-400"></div>
    </section>

    <!-- 管理員入口 -->
    <button onclick="document.getElementById('adminModal').classList.remove('hidden')" class="mt-8 text-[10px] text-slate-500 uppercase hover:text-white">
        <i class="fa-solid fa-lock mr-1"></i> 管理員登入
    </button>

    <!-- 管理員彈窗與後台面板 (省略，同前述邏輯) -->

    <script>
        let db = {
            "A101": { name: "呂陳英妹", unit: "總部", p1: 98, p2: 97, p3: 98, pass: true, reward: "無", openDate: "2026-05-31" },
            "A102": { name: "呂佳寯", unit: "總部", p1: 95, p2: 90, p3: 92, pass: true, reward: "無", openDate: "2026-05-31" },
            "A103": { name: "呂佳芯", unit: "總部", p1: 90, p2: 85, p3: 88, pass: true, reward: "無", openDate: "2026-05-31" },
            "A104": { name: "呂幸福", unit: "總部", p1: 85, p2: 88, p3: 86, pass: true, reward: "無", openDate: "2026-05-31" },
            "A105": { name: "吳孟綺", unit: "總部", p1: 84, p2: 87, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "A106": { name: "呂理享", unit: "總部", p1: 86, p2: 85, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "A107": { name: "阮氏紅幸", unit: "總部", p1: 83, p2: 82, p3: 82, pass: true, reward: "無", openDate: "2026-05-31" },
            "C301": { name: "呂寶梅", unit: "第二分支", p1: 82, p2: 85, p3: 83, pass: true, reward: "無", openDate: "2026-05-31" },
            "C302": { name: "劉沛緹", unit: "第二分支", p1: 80, p2: 84, p3: 82, pass: true, reward: "無", openDate: "2026-05-31" },
            "C303": { name: "劉宗豪", unit: "第二分支", p1: 81, p2: 82, p3: 81, pass: true, reward: "無", openDate: "2026-05-31" },
            "B201": { name: "於國輝", unit: "第一分支", p1: 84, p2: 86, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "B202": { name: "於子祥", unit: "第一分支", p1: 82, p2: 85, p3: 83, pass: true, reward: "無", openDate: "2026-05-18" },
            "B203": { name: "呂寶珠", unit: "第一分支", p1: 83, p2: 87, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "B204": { name: "陳凱華", unit: "第一分支", p1: 81, p2: 83, p3: 82, pass: true, reward: "無", openDate: "2026-05-31" },
            "B205": { name: "劉羿汝", unit: "第一分支", p1: 55, p2: 50, p3: 52, pass: false, reward: "無", openDate: "2026-05-20" },
            "B206": { name: "陳俊廷", unit: "第一分支", p1: 82, p2: 80, p3: 81, pass: true, reward: "無", openDate: "2026-05-31" }
        };

        function verifyMember() {
            const key = document.getElementById('memberKey').value;
            const p = db[key];
            if(!p) { alert("授權碼錯誤"); return; }
            if(new Date() < new Date(p.openDate)) { alert("未達開放時間"); return; }
            
            document.getElementById('memberResult').innerHTML = `
                <div class="mt-4 p-4 bg-slate-800 rounded-xl text-left space-y-1">
                    <div class="font-bold text-white text-base">${p.name}</div>
                    <div class="text-xs text-slate-400">${p.unit}</div>
                    <div class="text-cyan-400">總評：${p.p3} (${p.pass ? '通過' : '未通過'})</div>
                    <div class="text-xs">表現:${p.p1} 績效:${p.p2}</div>
                    <div class="text-amber-400 text-xs">獎懲：${p.reward}</div>
                </div>`;
        }
    </script>
</body>
</html>
