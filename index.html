<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>呂氏家庭考績中心 - 最終整合系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Courier New', monospace; }
        .ui-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 2rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div id="systemModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-[1000] p-6">
        <div class="bg-[#0f172a] border border-cyan-500/50 p-10 rounded-[2.5rem] w-full max-w-lg text-center shadow-2xl">
            <div id="modalTitle" class="text-2xl font-bold text-cyan-400 mb-6 uppercase tracking-widest">SYSTEM</div>
            <div id="modalBody" class="text-xl text-white mb-10 leading-relaxed"></div>
            <button onclick="document.getElementById('systemModal').classList.add('hidden')" class="w-full bg-cyan-600 py-5 rounded-2xl font-bold text-xl text-white hover:bg-cyan-500 transition">確認</button>
        </div>
    </div>

    <section class="ui-card w-full max-w-lg p-10 text-center shadow-2xl">
        <h1 class="text-3xl font-bold text-cyan-400 mb-2">呂氏家庭考績中心</h1>
        <p class="text-sm text-slate-400 mb-8 uppercase tracking-widest font-bold">政戰幹部：呂佳寯 負責</p>
        
        <div class="mb-8 p-5 border border-red-900 bg-red-950/30 rounded-2xl">
            <p class="text-sm text-red-400 font-bold uppercase"><i class="fa-solid fa-triangle-exclamation mr-2"></i> 僅限本人授權碼查詢</p>
        </div>
        
        <input type="text" id="memberKey" placeholder="輸入授權碼..." class="w-full bg-[#1e293b] border border-slate-700 rounded-2xl px-8 py-6 mb-4 text-center text-xl text-white">
        <button onclick="verifyMember()" class="w-full bg-[#0891b2] py-6 rounded-2xl font-bold text-xl text-white mb-8 hover:bg-[#06748c] transition">查詢考績</button>
        
        <div class="border-t border-slate-800 pt-8">
            <input type="text" id="nameInput" placeholder="輸入姓名查詢代碼" class="w-full bg-[#1e293b] border border-slate-700 rounded-2xl px-8 py-5 mb-4 text-center text-lg text-white">
            <button onclick="findKeyByName()" class="w-full bg-[#1e293b] py-5 rounded-2xl text-lg font-bold hover:bg-slate-700 text-white transition">查詢專屬代碼</button>
        </div>
    </section>

    <button onclick="document.getElementById('adminModal').classList.remove('hidden')" class="fixed bottom-8 right-8 bg-indigo-600 p-6 rounded-full shadow-2xl hover:bg-indigo-500 transition z-[100]">
        <i class="fa-solid fa-shield-halved text-3xl text-white"></i>
    </button>

    <div id="adminModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-[600]">
        <div class="ui-card w-full max-w-sm p-10 text-center shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 text-white">管理員驗證</h3>
            <input type="password" id="adminPass" placeholder="輸入管理密碼..." class="w-full bg-[#1e293b] border border-slate-600 rounded-xl px-6 py-5 mb-6 text-center text-white">
            <button onclick="verifyAdmin()" class="w-full bg-[#4f46e5] py-5 rounded-xl font-bold text-white hover:bg-[#4338ca] transition">驗證進入</button>
        </div>
    </div>

    <div id="adminPanel" class="fixed inset-0 bg-slate-950 hidden p-6 overflow-y-auto z-[500]">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-indigo-400 font-bold text-4xl">資料維護系統</h2>
                <button onclick="document.getElementById('adminPanel').classList.add('hidden')" class="text-white text-4xl px-4">✕</button>
            </div>
            <div id="dataRows" class="space-y-4"></div>
        </div>
    </div>

    <script>
        let db = {
            "A101": { name: "呂陳英妹", role: "幹部", status: "在職", p1: 98, p2: 97, p3: 98, pass: true, reward: "無", date: "2026-05-31" },
            "A102": { name: "呂佳寯", role: "幹部", status: "在職", p1: 95, p2: 90, p3: 92, pass: true, reward: "無", date: "2026-05-31" },
            "A103": { name: "呂佳芯", role: "同仁", status: "在職", p1: 90, p2: 85, p3: 88, pass: true, reward: "無", date: "2026-05-31" },
            "A104": { name: "呂幸福", role: "同仁", status: "在職", p1: 85, p2: 88, p3: 86, pass: true, reward: "無", date: "2026-05-31" },
            "A105": { name: "吳孟綺", role: "同仁", status: "在職", p1: 84, p2: 87, p3: 85, pass: true, reward: "無", date: "2026-05-31" },
            "A106": { name: "呂理享", role: "同仁", status: "在職", p1: 86, p2: 85, p3: 85, pass: true, reward: "無", date: "2026-05-31" },
            "A107": { name: "阮氏紅幸", role: "同仁", status: "在職", p1: 83, p2: 82, p3: 82, pass: true, reward: "無", date: "2026-05-31" },
            "C301": { name: "呂寶梅", role: "幹部", status: "在職", p1: 82, p2: 85, p3: 83, pass: true, reward: "無", date: "2026-05-31" },
            "C302": { name: "劉沛緹", role: "同仁", status: "在職", p1: 80, p2: 84, p3: 82, pass: true, reward: "無", date: "2026-05-31" },
            "C303": { name: "劉宗豪", role: "同仁", status: "在職", p1: 81, p2: 82, p3: 81, pass: true, reward: "無", date: "2026-05-31" },
            "B201": { name: "于國輝", role: "幹部", status: "在職", p1: 84, p2: 86, p3: 85, pass: true, reward: "無", date: "2026-05-31" },
            "B202": { name: "于子祥", role: "同仁", status: "在職", p1: 82, p2: 85, p3: 83, pass: true, reward: "無", date: "2026-05-18" },
            "B203": { name: "呂寶珠", role: "同仁", status: "在職", p1: 83, p2: 87, p3: 85, pass: true, reward: "無", date: "2026-05-31" },
            "B204": { name: "陳凱華", role: "同仁", status: "在職", p1: 81, p2: 83, p3: 82, pass: true, reward: "無", date: "2026-05-31" },
            "B205": { name: "劉羿汝", role: "同仁", status: "撤職", p1: 55, p2: 50, p3: 52, pass: false, reward: "無", date: "2026-05-20" },
            "B206": { name: "陳俊廷", role: "同仁", status: "在職", p1: 82, p2: 80, p3: 81, pass: true, reward: "無", date: "2026-05-31" }
        };

        function showModal(t, b) { document.getElementById('modalTitle').innerText = t; document.getElementById('modalBody').innerHTML = b; document.getElementById('systemModal').classList.remove('hidden'); }
        function verifyMember() { const p = db[document.getElementById('memberKey').value.trim()]; if(!p) showModal("錯誤", "無效授權碼。"); else showModal("考績查詢", `姓名：${p.name}<br>總評：${p.p3}<br>狀態：${p.pass ? "考核通過" : "考核未通過"}`); }
        function findKeyByName() { const val = document.getElementById('nameInput').value.trim(); const k = Object.keys(db).find(k => db[k].name === val); showModal("查詢結果", k ? "專屬代碼: " + k : "查無此人"); }
        function verifyAdmin() { if(document.getElementById('adminPass').value === "admin9999") { document.getElementById('adminModal').classList.add('hidden'); document.getElementById('adminPanel').classList.remove('hidden'); renderAdminPanel(); } else showModal("錯誤", "密碼錯誤"); }
        
        function renderAdminPanel() { document.getElementById('dataRows').innerHTML = Object.entries(db).map(([k, p]) => `
            <div class="grid grid-cols-[2fr,1fr,1fr,1.5fr,1fr,1.5fr,1fr,1fr] gap-2 items-center bg-slate-900 p-4 rounded-xl border border-slate-700 text-lg">
                <div class="text-white font-bold truncate">${p.name} (${k})</div>
                <select class="bg-slate-800 p-2 rounded text-white">${['在職', '撤職'].map(s => `<option ${p.status==s?'selected':''}>${s}</option>`).join('')}</select>
                <select class="bg-slate-800 p-2 rounded text-white">${['幹部', '同仁'].map(r => `<option ${p.role==r?'selected':''}>${r}</option>`).join('')}</select>
                <div class="flex gap-1"><input value="${p.p1}" class="w-12 bg-slate-800 text-center p-2 rounded text-white"><input value="${p.p2}" class="w-12 bg-slate-800 text-center p-2 rounded text-white"><input value="${p.p3}" class="w-12 bg-slate-800 text-center p-2 rounded text-white"></div>
                <select class="bg-slate-800 p-2 rounded text-white">${['無', '警告', '小過', '嘉獎', '小功', '大功'].map(r => `<option ${p.reward==r?'selected':''}>${r}</option>`).join('')}</select>
                <input type="date" value="${p.date}" class="bg-slate-800 p-2 rounded text-white">
                <select class="bg-slate-800 p-2 rounded ${p.pass ? 'text-emerald-400' : 'text-red-400'}"><option value="true" ${p.pass?'selected':''}>通過</option><option value="false" ${!p.pass?'selected':''}>未通過</option></select>
                <button class="bg-indigo-600 px-6 py-3 rounded-xl font-bold hover:bg-indigo-500" onclick="showModal('系統', '資料已同步')">儲存</button>
            </div>`).join(''); }
    </script>
</body>
</html>
