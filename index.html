<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>呂氏家庭考績中心 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>body { background: #020617; color: #f8fafc; font-family: sans-serif; }</style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-center">

    <!-- 前台查詢 -->
    <section class="max-w-md w-full bg-slate-900 p-8 rounded-3xl border border-cyan-500/30 shadow-2xl text-center">
        <h1 class="text-lg font-black text-white mb-1">呂氏家庭考績中心</h1>
        <p class="text-[10px] text-cyan-400 mb-6 uppercase tracking-widest">政戰幹部：呂佳寯 負責</p>
        
        <input type="text" id="memberKey" maxlength="4" placeholder="輸入授權碼後按 Enter..." 
               onkeydown="if(event.key === 'Enter') verifyMember()"
               class="w-full bg-slate-950 border border-slate-700 rounded-xl px-6 py-4 mb-4 text-center text-white">
        <button onclick="verifyMember()" class="w-full bg-cyan-600 py-4 rounded-xl font-bold uppercase text-sm">查詢考績</button>
    </section>

    <button onclick="document.getElementById('adminModal').classList.remove('hidden')" class="mt-8 text-[10px] text-slate-500 uppercase hover:text-white">
        <i class="fa-solid fa-lock mr-1"></i> 管理員登入
    </button>

    <!-- 管理員後台 -->
    <div id="adminPanel" class="fixed inset-0 bg-slate-950 hidden p-4 overflow-y-auto z-[200]">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-indigo-400 font-bold uppercase">全體資料維護 (16人)</h2>
                <button onclick="document.getElementById('adminPanel').classList.add('hidden')" class="text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="dataRows" class="space-y-2"></div>
        </div>
    </div>

    <!-- 驗證與結果彈窗 -->
    <div id="adminModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-[300]"><div class="bg-slate-900 p-8 rounded-3xl w-full max-w-sm border border-indigo-500"><h3 class="font-bold mb-4 text-indigo-400">管理員驗證</h3><input type="password" id="adminPass" placeholder="輸入密碼..." class="w-full bg-slate-800 p-3 rounded-lg mb-4 text-center text-white"><button onclick="verifyAdmin()" class="w-full bg-indigo-600 py-2 rounded-lg font-bold">驗證進入</button></div></div>
    <div id="resultModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-[400]"><div class="bg-slate-900 p-8 rounded-3xl border border-cyan-500 w-full max-w-xs text-center"><div id="modalBody" class="text-white space-y-2"></div><button onclick="document.getElementById('resultModal').classList.add('hidden')" class="mt-6 w-full bg-slate-700 py-2 rounded-lg">關閉</button></div></div>

    <script>
        const rewardOptions = ['無', '警告', '小過', '嘉獎', '小功', '大功'];
        let db = {
            "A101": { name: "呂陳英妹", role: "幹部", status: "在職", p1: 98, p2: 97, p3: 98, pass: true, reward: "無", openDate: "2026-05-31" },
            "A102": { name: "呂佳寯", role: "幹部", status: "在職", p1: 95, p2: 90, p3: 92, pass: true, reward: "無", openDate: "2026-05-31" },
            "A103": { name: "呂佳芯", role: "同仁", status: "在職", p1: 90, p2: 85, p3: 88, pass: true, reward: "無", openDate: "2026-05-31" },
            "A104": { name: "呂幸福", role: "同仁", status: "在職", p1: 85, p2: 88, p3: 86, pass: true, reward: "無", openDate: "2026-05-31" },
            "A105": { name: "吳孟綺", role: "同仁", status: "在職", p1: 84, p2: 87, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "A106": { name: "呂理享", role: "同仁", status: "在職", p1: 86, p2: 85, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "A107": { name: "阮氏紅幸", role: "同仁", status: "在職", p1: 83, p2: 82, p3: 82, pass: true, reward: "無", openDate: "2026-05-31" },
            "C301": { name: "呂寶梅", role: "幹部", status: "在職", p1: 82, p2: 85, p3: 83, pass: true, reward: "無", openDate: "2026-05-31" },
            "C302": { name: "劉沛緹", role: "同仁", status: "在職", p1: 80, p2: 84, p3: 82, pass: true, reward: "無", openDate: "2026-05-31" },
            "C303": { name: "劉宗豪", role: "同仁", status: "在職", p1: 81, p2: 82, p3: 81, pass: true, reward: "無", openDate: "2026-05-31" },
            "B201": { name: "於國輝", role: "幹部", status: "在職", p1: 84, p2: 86, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "B202": { name: "於子祥", role: "同仁", status: "在職", p1: 82, p2: 85, p3: 83, pass: true, reward: "無", openDate: "2026-05-18" },
            "B203": { name: "呂寶珠", role: "同仁", status: "在職", p1: 83, p2: 87, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "B204": { name: "陳凱華", role: "同仁", status: "在職", p1: 81, p2: 83, p3: 82, pass: true, reward: "無", openDate: "2026-05-31" },
            "B205": { name: "劉羿汝", role: "同仁", status: "撤職", p1: 55, p2: 50, p3: 52, pass: false, reward: "無", openDate: "2026-05-20" },
            "B206": { name: "陳俊廷", role: "同仁", status: "在職", p1: 82, p2: 80, p3: 81, pass: true, reward: "無", openDate: "2026-05-31" }
        };

        function renderAdminPanel() {
            const rows = document.getElementById('dataRows');
            rows.innerHTML = Object.entries(db).map(([k, p]) => `
                <div class="grid grid-cols-10 gap-2 items-center bg-slate-900 p-2 rounded text-[10px]">
                    <div class="col-span-2 font-bold text-indigo-400">${p.name}</div>
                    <select id="st_${k}"><option ${p.status=='在職'?'selected':''}>在職</option><option ${p.status=='撤職'?'selected':''}>撤職</option></select>
                    <select id="ro_${k}"><option ${p.role=='幹部'?'selected':''}>幹部</option><option ${p.role=='同仁'?'selected':''}>同仁</option></select>
                    <div class="flex gap-0.5"><input id="p1_${k}" value="${p.p1}" class="w-6 bg-slate-800 text-center"><input id="p2_${k}" value="${p.p2}" class="w-6 bg-slate-800 text-center"><input id="p3_${k}" value="${p.p3}" class="w-6 bg-slate-800 text-center"></div>
                    <select id="rw_${k}">${rewardOptions.map(r => `<option ${p.reward==r?'selected':''}>${r}</option>`).join('')}</select>
                    <input id="date_${k}" type="date" value="${p.openDate}" class="bg-slate-800">
                    <select id="pas_${k}"><option value="true" ${p.pass?'selected':''}>通過</option><option value="false" ${!p.pass?'selected':''}>未通過</option></select>
                    <button onclick="update('${k}')" class="bg-indigo-600 py-1 rounded font-bold">儲存</button>
                </div>`).join('');
        }

        function update(k) {
            db[k].status = document.getElementById('st_'+k).value;
            db[k].role = document.getElementById('ro_'+k).value;
            db[k].p1 = document.getElementById('p1_'+k).value;
            db[k].p2 = document.getElementById('p2_'+k).value;
            db[k].p3 = document.getElementById('p3_'+k).value;
            db[k].reward = document.getElementById('rw_'+k).value;
            db[k].pass = document.getElementById('pas_'+k).value === "true";
            db[k].openDate = document.getElementById('date_'+k).value;
            alert(db[k].name + " 已同步");
        }

        function verifyMember() {
            const p = db[document.getElementById('memberKey').value.trim()];
            if(!p) { alert("授權碼錯誤"); return; }
            if(new Date() < new Date(p.openDate)) { alert("未達開放時間"); return; }
            document.getElementById('modalBody').innerHTML = `<div class="text-xl font-bold">${p.name}</div><div class="text-cyan-400 font-bold">考核分數：${p.p3}</div><div class="${p.pass?'text-emerald-400':'text-red-400'} font-bold">${p.pass?'考核通過':'考核未通過'}</div>`;
            document.getElementById('resultModal').classList.remove('hidden');
        }

        function verifyAdmin() { if(document.getElementById('adminPass').value === "admin9999") { document.getElementById('adminModal').classList.add('hidden'); document.getElementById('adminPanel').classList.remove('hidden'); renderAdminPanel(); } else alert("密碼錯誤"); }
    </script>
</body>
</html>
