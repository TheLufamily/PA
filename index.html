<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>呂氏家庭考績中心 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>body { background: #020617; color: #f8fafc; font-family: sans-serif; }</style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-center">

    <!-- 查詢區 -->
    <section class="max-w-md w-full bg-slate-900 p-8 rounded-3xl border border-cyan-500/30 shadow-2xl text-center">
        <h1 class="text-lg font-black text-white mb-6">呂氏家庭考績中心</h1>
        <input type="password" id="memberKey" maxlength="4" placeholder="輸入授權碼..." class="w-full bg-slate-950 border border-slate-700 rounded-xl px-6 py-4 mb-4 text-center text-white">
        <button onclick="verifyMember()" class="w-full bg-cyan-600 py-4 rounded-xl font-bold uppercase text-sm">查詢考績</button>
    </section>

    <button onclick="document.getElementById('adminModal').classList.remove('hidden')" class="mt-8 text-[10px] text-slate-500 uppercase hover:text-white">
        <i class="fa-solid fa-lock mr-1"></i> 管理員登入
    </button>

    <!-- 後台面板（列表模式） -->
    <div id="adminPanel" class="fixed inset-0 bg-slate-950 hidden p-4 overflow-y-auto z-[200]">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-indigo-400 font-bold uppercase">全體資料維護系統</h2>
                <button onclick="document.getElementById('adminPanel').classList.add('hidden')" class="text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="adminDataList" class="space-y-2 pb-20">
                <!-- 標題行 -->
                <div class="grid grid-cols-10 gap-2 text-[10px] text-slate-400 uppercase px-2 mb-2">
                    <div class="col-span-2">姓名</div><div>狀態</div><div>職稱</div><div>P1/P2/P3</div><div>獎懲</div><div>開放日</div><div>判定</div><div class="col-span-2">操作</div>
                </div>
                <div id="dataRows"></div>
            </div>
        </div>
    </div>

    <!-- 管理員驗證與彈窗系統 (同前版本，省略顯示) -->
    <!-- ... (管理員彈窗、驗證邏輯與結果彈窗代碼相同) ... -->

    <script>
        const rewardOptions = ['無', '警告', '小過', '嘉獎', '小功', '大功'];
        let db = {
            "A101": { name: "呂陳英妹", unit: "總部", role: "幹部", status: "在職", p1: 98, p2: 97, p3: 98, pass: true, reward: "無", openDate: "2026-05-31" },
            "A102": { name: "呂佳寯", unit: "總部", role: "幹部", status: "在職", p1: 95, p2: 90, p3: 92, pass: true, reward: "無", openDate: "2026-05-31" },
            "A103": { name: "呂佳芯", unit: "總部", role: "同仁", status: "在職", p1: 90, p2: 85, p3: 88, pass: true, reward: "無", openDate: "2026-05-31" },
            "A104": { name: "呂幸福", unit: "總部", role: "同仁", status: "在職", p1: 85, p2: 88, p3: 86, pass: true, reward: "無", openDate: "2026-05-31" },
            "A105": { name: "吳孟綺", unit: "總部", role: "同仁", status: "在職", p1: 84, p2: 87, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "A106": { name: "呂理享", unit: "總部", role: "同仁", status: "在職", p1: 86, p2: 85, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "A107": { name: "阮氏紅幸", unit: "總部", role: "同仁", status: "在職", p1: 83, p2: 82, p3: 82, pass: true, reward: "無", openDate: "2026-05-31" },
            "C301": { name: "呂寶梅", unit: "第二分支", role: "幹部", status: "在職", p1: 82, p2: 85, p3: 83, pass: true, reward: "無", openDate: "2026-05-31" },
            "C302": { name: "劉沛緹", unit: "第二分支", role: "同仁", status: "在職", p1: 80, p2: 84, p3: 82, pass: true, reward: "無", openDate: "2026-05-31" },
            "C303": { name: "劉宗豪", unit: "第二分支", role: "同仁", status: "在職", p1: 81, p2: 82, p3: 81, pass: true, reward: "無", openDate: "2026-05-31" },
            "B201": { name: "於國輝", unit: "第一分支", role: "幹部", status: "在職", p1: 84, p2: 86, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "B202": { name: "於子祥", unit: "第一分支", role: "同仁", status: "在職", p1: 82, p2: 85, p3: 83, pass: true, reward: "無", openDate: "2026-05-18" },
            "B203": { name: "呂寶珠", unit: "第一分支", role: "同仁", status: "在職", p1: 83, p2: 87, p3: 85, pass: true, reward: "無", openDate: "2026-05-31" },
            "B204": { name: "陳凱華", unit: "第一分支", role: "同仁", status: "在職", p1: 81, p2: 83, p3: 82, pass: true, reward: "無", openDate: "2026-05-31" },
            "B205": { name: "劉羿汝", unit: "第一分支", role: "同仁", status: "撤職", p1: 55, p2: 50, p3: 52, pass: false, reward: "無", openDate: "2026-05-20" },
            "B206": { name: "陳俊廷", unit: "第一分支", role: "同仁", status: "在職", p1: 82, p2: 80, p3: 81, pass: true, reward: "無", openDate: "2026-05-31" }
        };

        function renderAdminPanel() {
            const rows = document.getElementById('dataRows');
            rows.innerHTML = Object.entries(db).map(([k, p]) => `
                <div class="grid grid-cols-10 gap-2 items-center bg-slate-900 p-2 rounded text-[10px]">
                    <div class="col-span-2 font-bold text-indigo-400">${p.name}</div>
                    <select id="st_${k}" class="bg-slate-800"><option ${p.status=='在職'?'selected':''}>在職</option><option ${p.status=='撤職'?'selected':''}>撤職</option></select>
                    <select id="ro_${k}" class="bg-slate-800"><option ${p.role=='幹部'?'selected':''}>幹部</option><option ${p.role=='同仁'?'selected':''}>同仁</option></select>
                    <div class="flex gap-0.5"><input id="p1_${k}" value="${p.p1}" class="w-6 bg-slate-800 text-center"><input id="p2_${k}" value="${p.p2}" class="w-6 bg-slate-800 text-center"><input id="p3_${k}" value="${p.p3}" class="w-6 bg-slate-800 text-center"></div>
                    <select id="rw_${k}" class="bg-slate-800">${rewardOptions.map(r => `<option ${p.reward==r?'selected':''}>${r}</option>`).join('')}</select>
                    <input id="date_${k}" type="date" value="${p.openDate}" class="bg-slate-800">
                    <select id="pas_${k}" class="bg-slate-800"><option value="true" ${p.pass?'selected':''}>通過</option><option value="false" ${!p.pass?'selected':''}>未通過</option></select>
                    <button onclick="update('${k}')" class="col-span-2 bg-indigo-600 py-1 rounded font-bold">儲存</button>
                </div>`).join('');
        }
        // ... (其他驗證與更新邏輯維持不變)
    </script>
</body>
</html>
