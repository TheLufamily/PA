<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呂氏家庭生活資訊網 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap');
        body { font-family: "Noto Sans TC", sans-serif; background: #020617; color: #f8fafc; }
        .tech-num { font-family: 'Orbitron', sans-serif; }
        .hex-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 254, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <section id="performance" class="max-w-2xl mx-auto">
        <div class="hex-card p-8 rounded-3xl border border-cyan-500/30 shadow-2xl">
            <h2 class="text-2xl font-black text-cyan-400 mb-6 flex items-center gap-2">
                <i class="fa-solid fa-user-shield"></i> 年度考績查詢 (數據矩陣)
            </h2>
            
            <input type="password" id="memberKey" 
                   class="w-full bg-slate-950 border border-slate-700 rounded-xl px-6 py-4 text-white text-lg tech-num focus:border-cyan-500 outline-none mb-4" 
                   placeholder="輸入授權碼...">
            
            <button onclick="verifyPerformance()" 
                    class="w-full bg-cyan-600 font-black py-4 rounded-xl hover:bg-cyan-500 transition-all uppercase tracking-widest">
                Execute Verification
            </button>

            <div id="resultOutput" class="mt-8 p-6 bg-slate-950 rounded-2xl hidden border border-slate-800"></div>
        </div>
    </section>

    <script>
        // 16位家族成員資料庫
        const membersDatabase = {
            "妹555": { name: "呂陳英妹", unit: "總部" }, "雋202": { name: "呂佳寯", unit: "總部" },
            "芯821": { name: "呂佳芯", unit: "總部" }, "福777": { name: "呂幸福", unit: "總部" },
            "綺111": { name: "吳孟綺", unit: "總部" }, "享123": { name: "呂理享", unit: "總部" },
            "幸001": { name: "阮氏紅幸", unit: "總部" }, "梅666": { name: "呂寶梅", unit: "第二分支" },
            "緹999": { name: "劉沛緹", unit: "第二分支" }, "豪888": { name: "劉宗豪", unit: "第二分支" },
            "輝321": { name: "于國輝", unit: "第一分支" }, "祥520": { name: "于子祥", unit: "第一分支" },
            "珠889": { name: "呂寶珠", unit: "第一分支" }, "華711": { name: "陳凱華", unit: "第一分支" },
            "汝101": { name: "劉羿汝", unit: "第一分支" }, "廷991": { name: "陳俊廷", unit: "第一分支" }
        };

        // 核心驗證邏輯
        function verifyPerformance() {
            const code = document.getElementById('memberKey').value.trim();
            const output = document.getElementById('resultOutput');
            output.classList.remove('hidden');

            if (code === "admin999") {
                output.innerHTML = `
                    <h3 class="text-indigo-400 font-bold mb-4 uppercase text-sm tracking-widest">系統管理員：全家族績效一覽</h3>
                    <div class="space-y-2 max-h-60 overflow-y-auto custom-scrollbar">
                        ${Object.entries(membersDatabase).map(([key, p]) => `
                            <div class="flex justify-between border-b border-slate-800 py-2 text-xs">
                                <span class="text-white font-bold">${p.name}</span>
                                <span class="text-slate-400">${p.unit}</span>
                            </div>`).join('')}
                    </div>`;
            } else if (membersDatabase[code]) {
                const p = membersDatabase[code];
                output.innerHTML = `
                    <div class="text-center">
                        <p class="text-slate-500 text-[10px] uppercase mb-2">身份驗證通過</p>
                        <h3 class="text-2xl font-black text-white">${p.name}</h3>
                        <p class="text-cyan-400 font-bold mb-6">${p.unit}</p>
                        <a href="#" class="inline-block px-8 py-3 bg-indigo-600 rounded-lg text-xs font-bold hover:bg-indigo-500 transition-all">
                            前往年度考核表
                        </a>
                    </div>`;
            } else {
                output.innerHTML = `<p class="text-pink-500 font-bold text-center">❌ 授權碼無效，請重新嘗試。</p>`;
            }
        }
    </script>
</body>
</html>
