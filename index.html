<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呂氏家庭生活資訊網 3.0 - 考績中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap');
        body { font-family: "Noto Sans TC", sans-serif; background: #020617; color: #f8fafc; }
        .tech-num { font-family: 'Orbitron', sans-serif; }
        .hex-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 254, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex items-center justify-center">

    <section id="performance" class="max-w-md w-full">
        <div class="hex-card p-8 rounded-3xl border border-cyan-500/30 shadow-2xl">
            <div class="text-center mb-6">
                <h1 class="text-lg font-black text-white tracking-widest">呂氏家庭考績中心</h1>
                <p class="text-[10px] text-cyan-400 mt-1 uppercase tracking-[0.2em]">政戰幹部：呂佳寯 負責</p>
            </div>
            
            <input type="password" id="memberKey" onkeydown="if(event.keyCode==13) verifyPerformance()"
                    lang="en" spellcheck="false" inputmode="latin"
                    class="w-full bg-slate-950 border border-slate-700 rounded-xl px-6 py-4 text-white text-lg tech-num focus:border-cyan-500 outline-none mb-4" 
                    placeholder="輸入授權碼...">
            
            <button onclick="verifyPerformance()" 
                    class="w-full bg-cyan-600 font-black py-4 rounded-xl hover:bg-cyan-500 transition-all uppercase tracking-widest text-sm mb-6">
                Execute Verification
            </button>

            <div class="border-t border-slate-800 pt-6">
                <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-3 text-center">忘記授權碼？查詢專區</p>
                <div class="flex gap-2">
                    <input type="text" id="nameQuery" onkeydown="if(event.keyCode==13) findKey()" class="flex-1 bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white outline-none focus:border-cyan-500" placeholder="輸入真實姓名...">
                    <button onclick="findKey()" class="bg-slate-800 px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-700">查詢</button>
                </div>
            </div>

            <div id="resultOutput" class="mt-8 p-6 bg-slate-950 rounded-2xl hidden border border-slate-800"></div>
        </div>
    </section>

    <script>
        const unitMap = { "A": "總部", "B": "第一分支", "C": "第二分支" };
        const rewardOptions = ['無', '警告', '小過', '嘉獎', '小功', '大功'];
        
        const membersDatabase = {
            "A101": { name: "呂陳英妹", unit: "A", pass: true, p1: 98, p2: 97, p3: 98, openDate: "2026-05-31", reward: "無", status: "在職", role: "幹部" },
            "A102": { name: "呂佳寯", unit: "A", pass: true, p1: 95, p2: 90, p3: 92, openDate: "2026-05-31", reward: "無", status: "在職", role: "幹部" },
            "A103": { name: "呂佳芯", unit: "A", pass: true, p1: 90, p2: 85, p3: 88, openDate: "2026-05-31", reward: "無", status: "在職", role: "同仁" },
            "A104": { name: "呂幸福", unit: "A", pass: true, p1: 85, p2: 88, p3: 86, openDate: "2026-05-31", reward: "無", status: "在職", role: "同仁" },
            "A105": { name: "吳孟綺", unit: "A", pass: true, p1: 84, p2: 87, p3: 85, openDate: "2026-05-31", reward: "無", status: "在職", role: "同仁" },
            "A106": { name: "呂理享", unit: "A", pass: true, p1: 86, p2: 85, p3: 85, openDate: "2026-05-31", reward: "無", status: "在職", role: "同仁" },
            "A107": { name: "阮氏紅幸", unit: "A", pass: true, p1: 83, p2: 82, p3: 82, openDate: "2026-05-31", reward: "無", status: "在職", role: "同仁" },
            "C301": { name: "呂寶梅", unit: "C", pass: true, p1: 82, p2: 85, p3: 83, openDate: "2026-05-31", reward: "無", status: "在職", role: "幹部" },
            "C302": { name: "劉沛緹", unit: "C", pass: true, p1: 80, p2: 84, p3: 82, openDate: "2026-05-31", reward: "無", status: "在職", role: "同仁" },
            "C303": { name: "劉宗豪", unit: "C", pass: true, p1: 81, p2: 82, p3: 81, openDate: "2026-05-31", reward: "無", status: "在職", role: "同仁" },
            "B201": { name: "於國輝", unit: "B", pass: true, p1: 84, p2: 86, p3: 85, openDate: "2026-05-31", reward: "無", status: "在職", role: "幹部" },
            "B202": { name: "於子祥", unit: "B", pass: true, p1: 82, p2: 85, p3: 83, openDate: "2026-05-18", reward: "無", status: "在職", role: "同仁" },
            "B203": { name: "呂寶珠", unit: "B", pass: true, p1: 83, p2: 87, p3: 85, openDate: "2026-05-31", reward: "無", status: "在職", role: "同仁" },
            "B204": { name: "陳凱華", unit: "B", pass: true, p1: 81, p2: 83, p3: 82, openDate: "2026-05-31", reward: "無", status: "在職", role: "同仁" },
            "B205": { name: "劉羿汝", unit: "B", pass: false, p1: 55, p2: 50, p3: 52, openDate: "2026-05-20", reward: "無", status: "撤職", role: "同仁" },
            "B206": { name: "陳俊廷", unit: "B", pass: true, p1: 82, p2: 80, p3: 81, openDate: "2026-05-31", reward: "無", status: "在職", role: "同仁" }
        };

        function verifyPerformance() {
            const code = document.getElementById('memberKey').value.trim();
            const output = document.getElementById('resultOutput');
            output.classList.remove('hidden');
            const now = new Date();

            if (code === "admin9999") {
                output.innerHTML = `
                    <h3 class="text-indigo-400 font-bold mb-4 text-xs uppercase tracking-widest text-center">管理員：全體資料維護</h3>
                    <div class="space-y-4 max-h-[300px] overflow-y-auto custom-scrollbar pr-2">
                        ${Object.entries(membersDatabase).map(([key, p], index) => `
                            <div class="bg-slate-900 p-3 rounded-lg border border-slate-800 text-xs">
                                <div class="text-white font-bold mb-1">${p.name} (${key})</div>
                                <div class="grid grid-cols-3 gap-1 mb-2">
                                    <input type="number" id="p1_${index}" value="${p.p1}" class="bg-slate-800 p-1 rounded text-center text-white" placeholder="P1">
                                    <input type="number" id="p2_${index}" value="${p.p2}" class="bg-slate-800 p-1 rounded text-center text-white" placeholder="P2">
                                    <input type="number" id="p3_${index}" value="${p.p3}" class="bg-slate-800 p-1 rounded text-center text-white" placeholder="P3">
                                </div>
                                <div class="grid grid-cols-2 gap-2 mb-2">
                                    <select id="pass_${index}" class="bg-slate-800 p-1 rounded text-center ${p.pass ? 'text-emerald-400' : 'text-red-400'}">
                                        <option value="true" ${p.pass ? 'selected' : ''}>通過</option>
                                        <option value="false" ${!p.pass ? 'selected' : ''}>未通過</option>
                                    </select>
                                    <select id="reward_${index}" class="bg-slate-800 p-1 rounded text-center text-amber-400">
                                        ${rewardOptions.map(r => `<option value="${r}" ${p.reward === r ? 'selected' : ''}>${r}</option>`).join('')}
                                    </select>
                                </div>
                                <input type="date" id="date_${index}" value="${p.openDate}" class="w-full bg-slate-800 p-1 rounded text-white text-center mb-2">
                                <button onclick="updateMember('${key}', ${index})" class="w-full bg-indigo-600 py-1.5 rounded hover:bg-indigo-500 transition-all font-bold">儲存資料</button>
                            </div>`).join('')}
                    </div>`;
            } else if (membersDatabase[code]) {
                const p = membersDatabase[code];
                const openDate = new Date(p.openDate + "T00:00:00");
                if (now < openDate) {
                    output.innerHTML = `<div class="text-center p-4"><i class="fa-solid fa-calendar-xmark text-pink-500 text-3xl mb-4"></i><h3 class="text-white font-bold text-lg">現在非開放查詢時間</h3><p class="text-slate-400 text-xs mt-2">預計 ${p.openDate} 開放。</p></div>`;
                } else {
                    output.innerHTML = `
                        <div class="text-center">
                            <div class="flex justify-center gap-2 mb-2">
                                <span class="px-2 py-0.5 bg-cyan-900/50 rounded text-[9px] text-cyan-300 border border-cyan-500/30">${unitMap[p.unit]}</span>
                                <span class="px-2 py-0.5 bg-slate-800 rounded text-[9px] ${p.status === '在職' ? 'text-blue-400' : 'text-red-500'} border border-slate-700">${p.status}</span>
                                <span class="px-2 py-0.5 bg-slate-800 rounded text-[9px] text-purple-400 border border-slate-700">${p.role}</span>
                            </div>
                            <h3 class="text-2xl font-black text-white mb-6">${p.name}</h3>
                            <div class="grid grid-cols-3 gap-2 mb-4">
                                <div class="bg-slate-900 p-2 rounded-lg"><p class="text-[8px] text-slate-500">表現</p><p class="font-bold text-white text-xs">${p.p1}</p></div>
                                <div class="bg-slate-900 p-2 rounded-lg"><p class="text-[8px] text-slate-500">績效</p><p class="font-bold text-white text-xs">${p.p2}</p></div>
                                <div class="bg-slate-900 p-2 rounded-lg"><p class="text-[8px] text-slate-500">總評</p><p class="font-bold text-cyan-400 text-xs">${p.p3}</p></div>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="bg-slate-900 p-2 rounded-lg"><p class="text-[8px] text-slate-500">考績狀態</p><p class="font-bold ${p.pass ? 'text-emerald-400' : 'text-red-400'} text-xs">${p.pass ? '通過' : '未通過'}</p></div>
                                <div class="bg-slate-900 p-2 rounded-lg"><p class="text-[8px] text-slate-500">獎懲紀錄</p><p class="font-bold text-amber-400 text-xs">${p.reward}</p></div>
                            </div>
                        </div>`;
                }
            } else {
                output.innerHTML = `<p class="text-pink-500 font-bold text-center text-xs">❌ 授權碼無效</p>`;
            }
        }

        function updateMember(key, index) {
            membersDatabase[key].p1 = parseInt(document.getElementById(`p1_${index}`).value);
            membersDatabase[key].p2 = parseInt(document.getElementById(`p2_${index}`).value);
            membersDatabase[key].p3 = parseInt(document.getElementById(`p3_${index}`).value);
            membersDatabase[key].pass = document.getElementById(`pass_${index}`).value === "true";
            membersDatabase[key].reward = document.getElementById(`reward_${index}`).value;
            membersDatabase[key].openDate = document.getElementById(`date_${index}`).value;
            alert(`[系統更新] ${membersDatabase[key].name} 資料已儲存！`);
        }

        function findKey() {
            const name = document.getElementById('nameQuery').value.trim();
            const output = document.getElementById('resultOutput');
            output.classList.remove('hidden');
            const found = Object.entries(membersDatabase).find(([key, p]) => p.name === name);
            if (found) {
                output.innerHTML = `<p class="text-emerald-400 font-bold text-center text-xs">🔍 您的授權碼為：<span class="text-white text-lg">${found[0]}</span></p>`;
            } else {
                output.innerHTML = `<p class="text-pink-500 font-bold text-center text-xs">❌ 查無此人姓名。</p>`;
            }
        }
    </script>
</body>
</html>
